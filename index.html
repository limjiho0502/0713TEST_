 <!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>열섬현상과 전력수요 관계 분석 시스템</title>
    <!-- Chart.js 및 PapaParse 라이브러리 CDN 로드 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .status-panel {
            display: flex;
            justify-content: space-around;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        .status-item {
            text-align: center;
        }

        .status-item span {
            display: block;
            font-size: 0.9rem;
            color: #718096;
        }

        .status-item strong {
            font-size: 1.2rem;
            color: var(--primary-color);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .chart-container {
            position: relative;
            height: 450px;
            width: 100%;
        }

        .analysis-box h3 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 8px;
        }

        .analysis-content {
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .highlight {
            font-weight: bold;
            color: #e53e3e;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>도시 열섬현상 & 전력수요 분석 dashboard</h1>
        <p>서울(도시)과 양평(교외)의 기온 차이를 통해 열섬현상이 전력수요에 미치는 영향을 분석합니다.</p>
    </header>

    <div class="status-panel">
        <div class="status-item">
            <span>분석 대상 파일</span>
            <strong>서울_기온.csv / 양평_기온.csv / 전력수요.csv</strong>
        </div>
        <div class="status-item">
            <span>데이터 상태</span>
            <strong id="data-status">데이터 로드 중...</strong>
        </div>
    </div>

    <div class="dashboard">
        <!-- 차트 영역 -->
        <div class="card">
            <div class="chart-container">
                <canvas id="analysisChart"></canvas>
            </div>
        </div>

        <!-- 인사이트 및 분석 요약 영역 -->
        <div class="card analysis-box">
            <h3>분석 인사이트</h3>
            <div class="analysis-content" id="analysis-text">
                데이터를 불러오는 중입니다. CSV 파일이 올바른 위치(`index.html`과 동일한 경로)에 있는지 확인해주세요.
            </div>
        </div>
    </div>
</div>

<script>
    const FILES = {
        seoul: './서울_기온.csv',
        yangpyeong: './양평_기온.csv',
        power: './전력수요.csv'
    };

    function fetchAndParseCSV(url) {
        return new Promise((resolve, reject) => {
            Papa.parse(url, {
                download: true,
                header: true,
                skipEmptyLines: true,
                dynamicTyping: true, // 숫자 자동 변환
                complete: (results) => resolve(results.data),
                error: (error) => reject(error)
            });
        });
    }

    // 헬퍼 함수: 객체에서 특정 키워드를 포함하는 컬럼의 값을 찾아 반환
    function getValueByKeyword(row, keywords) {
        const keys = Object.keys(row);
        for (const key of keys) {
            const cleanKey = key.replace(/\s+/g, ''); // 공백 제거
            for (const kw of keywords) {
                if (cleanKey.includes(kw)) {
                    return row[key];
                }
            }
        }
        return null;
    }

    // 날짜 포맷 정규화 (예: 2024-07-13 13:00 -> 2024-07-13)
    // 데이터 종류에 따라 시간 단위 정보가 섞여 있어도 매칭되도록 일자 부분 추출
    function normalizeDate(dateStr) {
        if (!dateStr) return '';
        const match = String(dateStr).trim().match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
        if (match) {
            return `${match[1]}-${String(match[2]).padStart(2, '0')}-${String(match[3]).padStart(2, '0')}`;
        }
        return String(dateStr).trim();
    }

    async function initAnalysis() {
        try {
            const [seoulData, ypData, powerData] = await Promise.all([
                fetchAndParseCSV(FILES.seoul),
                fetchAndParseCSV(FILES.yangpyeong),
                fetchAndParseCSV(FILES.power)
            ]);

            // 공백 및 유연한 컬럼 매핑을 위한 키워드 정의
            const dateKeywords = ['일시', '날짜', 'date', '일자'];
            const tempKeywords = ['평균기온', '기온', 'temp'];
            const powerKeywords = ['현재수요', '전력수요', '수요량', '값', 'power'];

            // 1. 전력 데이터 맵 생성 (날짜 정규화 적용)
            const powerMap = new Map();
            powerData.forEach(row => {
                const rawDate = getValueByKeyword(row, dateKeywords);
                const rawValue = getValueByKeyword(row, powerKeywords);
                if (rawDate !== null && rawValue !== null) {
                    powerMap.set(normalizeDate(rawDate), parseFloat(rawValue));
                }
            });

            // 2. 양평 기온 데이터 맵 생성
            const ypMap = new Map();
            ypData.forEach(row => {
                const rawDate = getValueByKeyword(row, dateKeywords);
                const rawTemp = getValueByKeyword(row, tempKeywords);
                if (rawDate !== null && rawTemp !== null) {
                    ypMap.set(normalizeDate(rawDate), parseFloat(rawTemp));
                }
            });

            // 3. 서울 데이터를 기준으로 결합
            const labels = [];
            const uhiIntensity = [];
            const powerDemand = [];
            let maxUhi = -999;
            let maxUhiDate = '';

            seoulData.forEach(row => {
                const rawDate = getValueByKeyword(row, dateKeywords);
                const rawSeoulTemp = getValueByKeyword(row, tempKeywords);

                if (rawDate === null || rawSeoulTemp === null) return;

                const normDate = normalizeDate(rawDate);

                if (ypMap.has(normDate) && powerMap.has(normDate)) {
                    const seoulTemp = parseFloat(rawSeoulTemp);
                    const ypTemp = ypMap.get(normDate);
                    const diff = seoulTemp - ypTemp; // 열섬 강도
                    
                    labels.push(normDate);
                    uhiIntensity.push(Number(diff.toFixed(2)));
                    powerDemand.push(powerMap.get(normDate));

                    if (diff > maxUhi) {
                        maxUhi = diff;
                        maxUhiDate = normDate;
                    }
                }
            });

            // 매칭된 데이터가 없을 때 방어 코드
            if (labels.length === 0) {
                document.getElementById('data-status').innerText = '매칭 실패';
                document.getElementById('data-status').style.color = '#e53e3e';
                document.getElementById('analysis-text').innerHTML = `
                    <p style="color: #e53e3e; font-weight: bold;">⚠️ 데이터를 불러왔으나 날짜나 형식이 일치하지 않습니다.</p>
                    <p>CSV 파일의 첫 번째 줄(헤더) 컬럼명이 <strong>'일시' 또는 '날짜'</strong>, 기온 파일은 <strong>'평균기온'</strong>, 전력 파일은 <strong>'현재수요' 또는 '전력수요'</strong>를 포함하고 있는지 확인해주세요.</p>
                `;
                return;
            }

            document.getElementById('data-status').innerText = `로드 완료 (${labels.length}건 분석)`;
            document.getElementById('data-status').style.color = '#38a169';

            // 4. 차트 그리기
            const ctx = document.getElementById('analysisChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '열섬 강도 (서울-양평 기온차, °C)',
                            data: uhiIntensity,
                            borderColor: '#e53e3e',
                            backgroundColor: 'rgba(229, 62, 62, 0.1)',
                            yAxisID: 'yTemp',
                            borderWidth: 2,
                            pointRadius: labels.length > 50 ? 1 : 3,
                            tension: 0.1
                        },
                        {
                            label: '전력 수요 (MW)',
                            data: powerDemand,
                            borderColor: '#3182ce',
                            backgroundColor: 'rgba(49, 130, 206, 0.1)',
                            yAxisID: 'yPower',
                            borderWidth: 2,
                            pointRadius: labels.length > 50 ? 1 : 3,
                            tension: 0.1,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: {
                            grid: { display: false },
                            title: { display: true, text: '조사 일시' }
                        },
                        yTemp: {
                            type: 'linear',
                            position: 'left',
                            title: { display: true, text: '기온 차이 (°C)' },
                            grid: { color: 'rgba(0,0,0,0.05)' }
                        },
                        yPower: {
                            type: 'linear',
                            position: 'right',
                            title: { display: true, text: '전력 수요 (MW)' },
                            grid: { display: false }
                        }
                    }
                }
            });

            // 5. 인사이트 출력
            document.getElementById('analysis-text').innerHTML = `
                <p>💡 <strong>분석 요약:</strong></p>
                <ul>
                    <li>도시(서울)와 교외지역(양평)의 기온 편차를 계산하여 대도시 <strong>열섬현상(UHI)</strong> 지표를 도출했습니다.</li>
                    <li>시각화 데이터를 통해 열섬 강도 그래프(적색)와 전력수요(청색)가 유사한 추세로 변동하는지 모니터링할 수 있습니다.</li>
                    <li>가장 높은 기온 차이를 보인 날은 <span class="highlight">${maxUhiDate}</span>로, 두 지역 간 약 <span class="highlight">${maxUhi.toFixed(1)}°C</span>의 차이가 발생했습니다.</li>
                </ul>
                <p>일반적으로 도시 내 열섬현상이 심화될수록 냉방 설비 가동률 증가 등으로 인해 대규모 전력수요 급증 현상이 동반되는 상관관계를 관찰할 수 있습니다.</p>
            `;

        } catch (error) {
            console.error(error);
            document.getElementById('data-status').innerText = '오류 발생';
            document.getElementById('data-status').style.color = '#e53e3e';
        }
    }

    window.addEventListener('DOMContentLoaded', initAnalysis);
</script>
</body>
</html>
