<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>열섬현상과 전력수요 관계 분석 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary-color); margin-bottom: 10px; }
        .status-panel {
            display: flex;
            justify-content: space-around;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .status-item { text-align: center; }
        .status-item span { display: block; font-size: 0.9rem; color: #718096; }
        .status-item strong { font-size: 1.2rem; color: var(--primary-color); }
        .dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .chart-container { position: relative; height: 450px; width: 100%; }
        .analysis-box h3 { margin-top: 0; color: var(--primary-color); border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        .analysis-content { line-height: 1.6; font-size: 0.95rem; }
        .highlight { font-weight: bold; color: #e53e3e; }
        .debug-info { font-size: 0.8rem; color: #718096; background: #edf2f7; padding: 12px; border-radius: 4px; margin-top: 15px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>도시 열섬현상 & 전력수요 분석 Dashboard</h1>
        <p>서울(도시)과 양평(교외)의 기온 차이를 통해 열섬현상이 전력수요에 미치는 영향을 분석합니다.</p>
    </header>

    <div class="status-panel">
        <div class="status-item">
            <span>분석 대상 파일</span>
            <strong>서울_기온.csv / 양평_기온.csv / 전력수요.csv</strong>
        </div>
        <div class="status-item">
            <span>데이터 상태</span>
            <strong id="data-status">데이터 로드 중...</strong>
        </div>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="chart-container">
                <canvas id="analysisChart"></canvas>
            </div>
        </div>
        <div class="card analysis-box">
            <h3>분석 인사이트</h3>
            <div class="analysis-content" id="analysis-text">
                데이터를 분석하는 중입니다...
            </div>
            <div class="debug-info" id="debug-log">디버그 로그 시작...</div>
        </div>
    </div>
</div>

<script>
    const FILES = {
        seoul: './서울_기온.csv',
        yangpyeong: './양평_기온.csv',
        power: './전력수요.csv'
    };

    let logContent = "";
    function log(msg) {
        logContent += msg + "\n";
        document.getElementById('debug-log').innerText = logContent;
    }

    function fetchAndParseCSV(url) {
        return new Promise((resolve, reject) => {
            Papa.parse(url, {
                download: true,
                header: false, // 헤더 이름 매칭 실패 리스크 원천 차단
                skipEmptyLines: true,
                complete: (results) => resolve(results.data),
                error: (error) => reject(error)
            });
        });
    }

    // 어떤 형태의 날짜 스트링이 들어와도 YYYY-MM-DD 형태로 변환하는 초강력 함수
    function parseToYYYYMMDD(dateStr) {
        if (!dateStr) return null;
        let str = String(dateStr).trim();

        // 1. 표준적인 대시(-), 슬래시(/), 마침표(.) 구분자 포맷 (예: 2024-01-01 13:00)
        const matchStandard = str.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
        if (matchStandard) {
            return `${matchStandard[1]}-${String(matchStandard[2]).padStart(2, '0')}-${String(matchStandard[3]).padStart(2, '0')}`;
        }

        // 2. 한글 날짜 포맷 (예: 2024년 01월 01일)
        const matchKorean = str.match(/^(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
        if (matchKorean) {
            return `${matchKorean[1]}-${String(matchKorean[2]).padStart(2, '0')}-${String(matchKorean[3]).padStart(2, '0')}`;
        }

        // 3. 순수 숫자 연속 포맷 (예: 2024010100)
        const pureDigits = str.replace(/[^0-9]/g, '');
        if (pureDigits.length >= 8) {
            return `${pureDigits.substring(0, 4)}-${pureDigits.substring(4, 6)}-${pureDigits.substring(6, 8)}`;
        }

        return null;
    }

    // 데이터 2차 정제 및 일평균 롤업 엔진
    function buildDataMap(rawRows, name) {
        const dataMap = new Map();
        let skipCount = 0;

        // 첫 줄이 텍스트 헤더일 가능성이 높으므로 인덱스 1부터 탐색 시도하되, 숫자면 0부터 포함
        rawRows.forEach((row, idx) => {
            if (row.length < 2) return;
            
            let rawDate = row[0];
            let rawVal = row[1];

            // 만약 첫 열이 지점번호코드(예: 108) 같은 짧은 순수 숫자라면 두 번째 열을 날짜로 간주 (기상청 표준 포맷 방어)
            if (idx > 0 && !isNaN(row[0]) && row[0].length <= 3 && row[1] && String(row[1]).replace(/[^0-9]/g, '').length >= 8) {
                rawDate = row[1];
                rawVal = row[2] || row[3];
            }

            const normDate = parseToYYYYMMDD(rawDate);
            
            if (normDate) {
                let val = parseFloat(String(rawVal).replace(/[^0-9.-]/g, ''));
                if (!isNaN(val)) {
                    if (!dataMap.has(normDate)) dataMap.set(normDate, []);
                    dataMap.get(normDate).push(val);
                } else {
                    skipCount++;
                }
            } else {
                skipCount++;
            }
        });

        log(`[${name}] 원본: ${rawRows.length}행 -> 정제: ${dataMap.size}일 확보 (제외: ${skipCount}행)`);
        return dataMap;
    }

    async function initAnalysis() {
        try {
            log("데이터 다운로드 진행 중...");
            const [seoulRaw, ypRaw, powerRaw] = await Promise.all([
                fetchAndParseCSV(FILES.seoul),
                fetchAndParseCSV(FILES.yangpyeong),
                fetchAndParseCSV(FILES.power)
            ]);

            log("구조 무관 순서 기반 정제 엔진 가동...");
            const seoulMap = buildDataMap(seoulRaw, "서울 기온");
            const ypMap = buildDataMap(ypRaw, "양평 기온");
            const powerMap = buildDataMap(powerRaw, "전력 수요");

            const labels = [];
            const uhiIntensity = [];
            const powerDemand = [];
            let maxUhi = -999;
            let maxUhiDate = '';

            const arrAvg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;

            const sortedDates = Array.from(seoulMap.keys()).sort();

            sortedDates.forEach(date => {
                if (ypMap.has(date) && powerMap.has(date)) {
                    const sAvg = arrAvg(seoulMap.get(date));
                    const yAvg = arrAvg(ypMap.get(date));
                    const pAvg = arrAvg(powerMap.get(date));

                    const diff = sAvg - yAvg;
                    
                    labels.push(date);
                    uhiIntensity.push(Number(diff.toFixed(2)));
                    powerDemand.push(Number(pAvg.toFixed(1)));

                    if (diff > maxUhi) {
                        maxUhi = diff;
                        maxUhiDate = date;
                    }
                }
            });

            if (labels.length === 0) {
                document.getElementById('data-status').innerText = '동일 날짜 없음';
                document.getElementById('data-status').style.color = '#e53e3e';
                
                // 디버깅 힌트 제공을 위해 샘플 날짜 출력
                const seoulSample = seoulMap.keys().next().value || '없음';
                const powerSample = powerMap.keys().next().value || '없음';
                
                document.getElementById('analysis-text').innerHTML = `
                    <p style="color: #e53e3e; font-weight: bold;">⚠️ 기간 불일치 오류</p>
                    <p>데이터 변환은 성공했으나, 상호 매칭되는 연도/날짜 구간이 존재하지 않습니다.</p>
                    <ul>
                        <li>서울 기온 날짜 샘플: <b>${seoulSample}</b></li>
                        <li>전력 수요 날짜 샘플: <b>${powerSample}</b></li>
                    </ul>
                    <p>두 데이터의 연도(예: 2023년 데이터와 2024년 데이터 대조 등)가 일치하는지 확인해 주세요.</p>
                `;
                return;
            }

            document.getElementById('data-status').innerText = `성공 (${labels.length}일 매칭 완료)`;
            document.getElementById('data-status').style.color = '#38a169';

            // Chart.js 그래프 생성
            const ctx = document.getElementById('analysisChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '열섬 강도 (서울-양평 기온차, °C)',
                            data: uhiIntensity,
                            borderColor: '#e53e3e',
                            backgroundColor: 'rgba(229, 62, 62, 0.05)',
                            yAxisID: 'yTemp',
                            borderWidth: 2,
                            pointRadius: labels.length > 31 ? 0 : 2,
                            tension: 0.1
                        },
                        {
                            label: '평균 전력 수요 (MW)',
                            data: powerDemand,
                            borderColor: '#3182ce',
                            backgroundColor: 'rgba(49, 130, 206, 0.1)',
                            yAxisID: 'yPower',
                            borderWidth: 2,
                            pointRadius: labels.length > 31 ? 0 : 2,
                            tension: 0.1,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { display: false } },
                        yTemp: { type: 'linear', position: 'left', title: { display: true, text: '기온 차이 (°C)' } },
                        yPower: { type: 'linear', position: 'right', title: { display: true, text: '전력 수요 (MW)' }, grid: { display: false } }
                    }
                }
            });

            document.getElementById('analysis-text').innerHTML = `
                <p>💡 <strong>분석 결과 요약:</strong></p>
                <ul>
                    <li>시간별 세부 정보 데이터 도합 <strong>${labels.length}일분</strong>을 날짜별 평균치 데이터로 융합 압축했습니다.</li>
                    <li>가장 높은 기온차를 보인 날은 <span class="highlight">${maxUhiDate}</span>로, 도시와 교외 간 편차는 <span class="highlight">${maxUhi.toFixed(1)}°C</span>였습니다.</li>
                </ul>
                <p>열섬 강도가 강해지는 타이밍(적색 선의 스파이크)과 도시 냉방 전력 수요(청색 면적)가 동조하여 움직이는 경향성을 시각적으로 파악할 수 있습니다.</p>
            `;

        } catch (error) {
            console.error(error);
            log("구동 에러 발생: " + error.message);
            document.getElementById('data-status').innerText = '구동 실패';
            document.getElementById('data-status').style.color = '#e53e3e';
        }
    }

    window.addEventListener('DOMContentLoaded', initAnalysis);
</script>
</body>
</html>
