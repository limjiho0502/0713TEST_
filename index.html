<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>열섬현상과 전력수요 관계 분석 시스템</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary-color: #2b6cb0;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary-color); margin-bottom: 10px; }
        .status-panel {
            display: flex;
            justify-content: space-around;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .status-item { text-align: center; }
        .status-item span { display: block; font-size: 0.9rem; color: #718096; }
        .status-item strong { font-size: 1.2rem; color: var(--primary-color); }
        .dashboard { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } }
        .card { background: var(--card-bg); padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .chart-container { position: relative; height: 450px; width: 100%; }
        .analysis-box h3 { margin-top: 0; color: var(--primary-color); border-bottom: 2px solid #e2e8f0; padding-bottom: 8px; }
        .analysis-content { line-height: 1.6; font-size: 0.95rem; }
        .highlight { font-weight: bold; color: #e53e3e; }
        .debug-info { font-size: 0.8rem; color: #718096; background: #edf2f7; padding: 12px; border-radius: 4px; margin-top: 15px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>도시 열섬현상 & 전력수요 분석 Dashboard</h1>
        <p>서울(도시)과 양평(교외)의 기온 차이를 통해 열섬현상이 전력수요에 미치는 영향을 분석합니다.</p>
    </header>

    <div class="status-panel">
        <div class="status-item">
            <span>분석 대상 파일</span>
            <strong>서울_기온.csv / 양평_기온.csv / 전력수요.csv</strong>
        </div>
        <div class="status-item">
            <span>데이터 상태</span>
            <strong id="data-status">데이터 로드 중...</strong>
        </div>
    </div>

    <div class="dashboard">
        <div class="card">
            <div class="chart-container">
                <canvas id="analysisChart"></canvas>
            </div>
        </div>
        <div class="card analysis-box">
            <h3>분석 인사이트</h3>
            <div class="analysis-content" id="analysis-text">
                데이터를 분석하는 중입니다...
            </div>
            <div class="debug-info" id="debug-log">디버그 로그 시작...</div>
        </div>
    </div>
</div>

<script>
    const FILES = {
        seoul: './서울_기온.csv',
        yangpyeong: './양평_기온.csv',
        power: './전력수요.csv'
    };

    let logContent = "";
    function log(msg) {
        logContent += msg + "\n";
        document.getElementById('debug-log').innerText = logContent;
    }

    function fetchAndParseCSV(url) {
        return new Promise((resolve, reject) => {
            Papa.parse(url, {
                download: true,
                header: true, // 컬럼명으로 정확히 접근
                skipEmptyLines: true,
                dynamicTyping: true,
                complete: (results) => resolve(results.data),
                error: (error) => reject(error)
            });
        });
    }

    // 유연하게 특정 키워드가 포함된 헤더의 값을 가져오는 함수
    function getValueByKeywords(row, keywords) {
        const keys = Object.keys(row);
        for (const key of keys) {
            const cleanKey = key.replace(/\s+/g, '').toLowerCase();
            for (const kw of keywords) {
                if (cleanKey.includes(kw.toLowerCase())) {
                    return row[key];
                }
            }
        }
        return null;
    }

    // 날짜 및 시간 포맷에서 오직 'YYYY-MM-DD'만 안전하게 추출하는 최적화 함수
    function parseToYYYYMMDD(dateStr) {
        if (!dateStr) return null;
        const str = String(dateStr).trim();
        
        // 1. 2024-01-01 00:00 또는 2024/01/01 형태 처리
        const match = str.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})/);
        if (match) {
            return `${match[1]}-${String(match[2]).padStart(2, '0')}-${String(match[3]).padStart(2, '0')}`;
        }
        
        // 2. 2024010100 형태 등 연속된 숫자 처리
        const pureDigits = str.replace(/[^0-9]/g, '');
        if (pureDigits.length >= 8) {
            return `${pureDigits.substring(0, 4)}-${pureDigits.substring(4, 6)}-${pureDigits.substring(6, 8)}`;
        }
        
        return null;
    }

    // 공통 맵 생성기 (날짜별로 값들을 모아 일평균 처리를 위함)
    function buildDataMap(rawData, dateKeywords, valKeywords, name) {
        const dataMap = new Map();
        let errorCount = 0;

        rawData.forEach(row => {
            const rawDate = getValueByKeywords(row, dateKeywords);
            const rawVal = getValueByKeywords(row, valKeywords);

            const normDate = parseToYYYYMMDD(rawDate);
            
            if (normDate && rawVal !== null && rawVal !== undefined) {
                // 한글 깨짐이나 단위 기호 텍스트 포함 시 숫자만 추출
                let val = typeof rawVal === 'number' ? rawVal : parseFloat(String(rawVal).replace(/[^0-9.-]/g, ''));
                
                if (!isNaN(val)) {
                    if (!dataMap.has(normDate)) dataMap.set(normDate, []);
                    dataMap.get(normDate).push(val);
                } else {
                    errorCount++;
                }
            }
        });

        log(`[${name}] 총 행: ${rawData.length} -> 정제: ${dataMap.size}일 확보 (실패: ${errorCount})`);
        return dataMap;
    }

    async function initAnalysis() {
        try {
            log("데이터 다운로드 진행 중...");
            const [seoulRaw, ypRaw, powerRaw] = await Promise.all([
                fetchAndParseCSV(FILES.seoul),
                fetchAndParseCSV(FILES.yangpyeong),
                fetchAndParseCSV(FILES.power)
            ]);

            // 타겟 키워드군 설정
            const dateKeywords = ['일시', '날짜', 'date', '일자', '시간', '거래일'];
            const tempKeywords = ['평균기온', '기온', 'temp'];
            const powerKeywords = ['현재수요', '전력수요', '수요량', '수요', 'power', '값'];

            log("구조 매핑 및 시간단위 데이터 압축 가동...");
            const seoulMap = buildDataMap(seoulRaw, dateKeywords, tempKeywords, "서울 기온");
            const ypMap = buildDataMap(ypRaw, dateKeywords, tempKeywords, "양평 기온");
            const powerMap = buildDataMap(powerRaw, dateKeywords, powerKeywords, "전력 수요");

            const labels = [];
            const uhiIntensity = [];
            const powerDemand = [];
            let maxUhi = -999;
            let maxUhiDate = '';

            const arrAvg = arr => arr.reduce((a, b) => a + b, 0) / arr.length;

            // 서울 정제 날짜 기준으로 교집합 결합
            const sortedDates = Array.from(seoulMap.keys()).sort();

            sortedDates.forEach(date => {
                if (ypMap.has(date) && powerMap.has(date)) {
                    const sAvg = arrAvg(seoulMap.get(date));
                    const yAvg = arrAvg(ypMap.get(date));
                    const pAvg = arrAvg(powerMap.get(date));

                    const diff = sAvg - yAvg; // 서울 - 양평 기온차 (열섬 지표)
                    
                    labels.push(date);
                    uhiIntensity.push(Number(diff.toFixed(2)));
                    powerDemand.push(Number(pAvg.toFixed(1)));

                    if (diff > maxUhi) {
                        maxUhi = diff;
                        maxUhiDate = date;
                    }
                }
            });

            if (labels.length === 0) {
                document.getElementById('data-status').innerText = '동일 날짜 없음';
                document.getElementById('data-status').style.color = '#e53e3e';
                document.getElementById('analysis-text').innerHTML = `
                    <p style="color: #e53e3e; font-weight: bold;">⚠️ 날짜 범위 불일치</p>
                    <p>각 파일 데이터는 정상 변환되었으나 서로 연도나 날짜 기간이 매칭되지 않습니다. 세 파일의 원본 일자 데이터를 대조해 주세요.</p>
                `;
                return;
            }

            document.getElementById('data-status').innerText = `성공 (${labels.length}일간의 분석 완료)`;
            document.getElementById('data-status').style.color = '#38a169';

            // Chart.js 시각화
            const ctx = document.getElementById('analysisChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: '열섬 강도 (서울-양평 기온차, °C)',
                            data: uhiIntensity,
                            borderColor: '#e53e3e',
                            backgroundColor: 'rgba(229, 62, 62, 0.05)',
                            yAxisID: 'yTemp',
                            borderWidth: 2,
                            pointRadius: labels.length > 31 ? 0 : 2,
                            tension: 0.1
                        },
                        {
                            label: '평균 전력 수요 (MW)',
                            data: powerDemand,
                            borderColor: '#3182ce',
                            backgroundColor: 'rgba(49, 130, 206, 0.1)',
                            yAxisID: 'yPower',
                            borderWidth: 2,
                            pointRadius: labels.length > 31 ? 0 : 2,
                            tension: 0.1,
                            fill: true
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        x: { grid: { display: false } },
                        yTemp: { type: 'linear', position: 'left', title: { display: true, text: '기온 차이 (°C)' } },
                        yPower: { type: 'linear', position: 'right', title: { display: true, text: '전력 수요 (MW)' }, grid: { display: false } }
                    }
                }
            });

            document.getElementById('analysis-text').innerHTML = `
                <p>💡 <strong>분석 결과 요약:</strong></p>
                <ul>
                    <li>시간대별로 분산되어 있던 <strong>${seoulRaw.length}건</strong>의 기상 정보 데이터를 하루 단위 일평균 데이터로 성공적으로 압축 융합했습니다.</li>
                    <li>가장 극심한 열섬현상이 기록된 일자는 <span class="highlight">${maxUhiDate}</span>로, 도심 편차가 무려 <span class="highlight">${maxUhi.toFixed(1)}°C</span>까지 벌어졌습니다.</li>
                </ul>
                <p>열섬 현상 곡선의 상승 구간에서 도시 냉방 전력 수요가 함께 폭증하는 전형적인 동조화 패턴을 확인할 수 있습니다.</p>
            `;

        } catch (error) {
            console.error(error);
            log("구동 에러 발생: " + error.message);
            document.getElementById('data-status').innerText = '구동 실패';
            document.getElementById('data-status').style.color = '#e53e3e';
        }
    }

    window.addEventListener('DOMContentLoaded', initAnalysis);
</script>
</body>
</html>
